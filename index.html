<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OldWest Inventario</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">

</head>
<body>
    <!-- Barra superior -->
    <header class="barra-superior">
        <h1>OLD WEST INVENTARIO</h1>
    </header>

    <!-- Formulario de login -->
    <div class="formulario">
        <h1>Inicio de sesión</h1>
        <form method="post">
            <div class="username">
                <input type="text" required>
                <label>Nombre de usuario</label>
            </div>
            <div class="password">
                <input type="password" required>
                <label>Contraseña</label>
            </div>
            <div class="recordar">¿Olvidó su contraseña?</div>
            <input type="submit" value="Iniciar">
            <div class="registrarse">
                Quiero hacer el <a href="#">registro</a>
            </div>
        </form>
    </div>

    <!-- Barra inferior -->
    <footer class="barra-inferior">
        <div class="redes">
            <a href="#">
                <img src="img/facebook.png" alt="Facebook"> Facebook
            </a>
            <a href="#">
                <img src="img/whatsapp.png" alt="WhatsApp"> WhatsApp
            </a>
            <a href="#">
                <img src="img/instagram.png" alt="Instagram"> Instagram
            </a>
    </div>
</footer>
</body>    
</html>
